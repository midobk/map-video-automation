name: Bootstrap lockfile

on:
  push:
    branches: [feat/1-phase-0-foundation]

permissions:
  contents: write

jobs:
  generate:
    if: ${{ hashFiles('pnpm-lock.yaml') == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/1-phase-0-foundation
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Commit generated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: generate pnpm lockfile"
          git push origin HEAD:feat/1-phase-0-foundation
