name: Refresh lockfile once

on:
  push:
    branches: [feat/1-phase-0-foundation]
    paths: [package.json]

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor == 'midobk'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: feat/1-phase-0-foundation
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
      - name: Enable Corepack
        run: corepack enable
      - name: Refresh frozen lockfile
        run: pnpm install --lockfile-only --ignore-scripts
      - name: Commit lockfile when changed
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo 'Lockfile already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          git commit -m 'chore: align lockfile with Node 22 types'
          git push origin HEAD:feat/1-phase-0-foundation
