name: Refresh PR 8 lockfile

on:
  push:
    branches: [feat/1c-vector-map-rendering]
    paths:
      - packages/renderer/package.json
      - .github/workflows/refresh-pr8-lockfile.yml

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: feat/1c-vector-map-rendering
      - run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: refresh vector-map lockfile"
          git push
